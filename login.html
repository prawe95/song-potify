<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Manager - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-page-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fab fa-spotify"></i>
                <span>SongManager</span>
            </div>

            <h1 class="login-title"><center>Log in</center></h1>
            <p class="login-subtitle">Manage your playlists and songs in one place.</p>

            <form class="login-form">
                <label for="identifier" class="login-label">Username or email</label>
                <input type="text" id="identifier" name="identifier" class="login-input" placeholder="Enter your username or email" required>

                <label for="password" class="login-label">Password</label>
                <input type="password" id="password" name="password" class="login-input" placeholder="Enter your password" required>

                <button type="submit" class="login-btn">Log in</button>

                <div class="login-helper-row">
                    <a href="#" class="forgot-link">Forgot your password?</a>
                </div>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="signup-row">
                    <span class="signup-text">Don't have an account?</span>
                    <a href="#" class="signup-link">Create an account</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
